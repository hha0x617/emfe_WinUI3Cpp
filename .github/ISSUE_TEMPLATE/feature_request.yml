name: Feature request
description: Suggest a new host-side feature, UI improvement, or workflow enhancement
labels: ["enhancement"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - UI / UX
        - Debugger (breakpoints, watchpoints, call stack)
        - Console / framebuffer
        - Settings / configuration
        - Build / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation — what problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: notes
    attributes:
      label: Additional context / references
