name: Build emfe_WinUI3Cpp

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release x64)
        # The vcxproj pins PlatformToolset=v145 (VS 18 local), but the
        # windows-latest runner currently ships v143.  Override via
        # MSBuild property — matches the approach used by
        # em68030_WinUI3Cpp's CI.
        run: >
          msbuild emfe_WinUI3Cpp.sln -restore
          /p:Configuration=Release
          /p:Platform=x64
          /p:PlatformToolset=v143
          /m

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: emfe_WinUI3Cpp-${{ github.sha }}
          path: |
            emfe/x64/Release/*.exe
            emfe/x64/Release/*.dll
            emfe/x64/Release/Assets/**
            emfe/x64/Release/resources.pri
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: emfe_WinUI3Cpp-*
          merge-multiple: true
          path: dist

      - name: Package
        run: |
          cd dist
          zip -r ../emfe_WinUI3Cpp-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: emfe_WinUI3Cpp-*.zip
          generate_release_notes: true
