name: Build and Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout emfe_WinUI3Cpp
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch submodules (emfe_plugins)
        shell: bash
        # Non-recursive: we only need emfe_plugins/api/emfe_plugin.h.
        # The inner submodules (em6809-core, Em68030_WinUI3Cpp) are
        # not required to build the host.
        run: git submodule update --init

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $ver = "0.0.0"
          if ("${{ github.ref }}" -match "^refs/tags/v(.+)$") {
            $ver = $Matches[1]
          } else {
            # `git describe` errors when no tag exists yet — don't fail the step.
            try {
              $desc = & git describe --tags --abbrev=0 2>$null
              if ($LASTEXITCODE -eq 0 -and $desc -match "^v(.+)$") {
                $ver = $Matches[1]
              }
            } catch {}
            $global:LASTEXITCODE = 0
          }
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build
        # The vcxproj pins PlatformToolset=v145 (VS 18 local) but the
        # windows-latest runner currently ships v143; override at build time.
        run: >
          msbuild emfe_WinUI3Cpp.sln -restore
          -p:Configuration=Release
          -p:Platform=x64
          -p:PlatformToolset=v143
          -p:AppVersion=${{ steps.version.outputs.APP_VERSION }}
          -v:minimal

      # TODO: uncomment once an emfe.Tests project exists.
      # - name: Test
      #   run: emfe/x64/Release/emfe.Tests.exe

      - name: Code Analysis
        shell: cmd
        run: >
          msbuild emfe/emfe.vcxproj
          -p:Configuration=Release
          -p:Platform=x64
          -p:PlatformToolset=v143
          -p:RunCodeAnalysis=true
          -p:CAExcludePath="$(ProjectDir)ThirdParty"
          -v:quiet
          -nologo

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          $src = "emfe/x64/Release"
          $dst = "release"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null

          Copy-Item "$src/emfe.exe" $dst
          Get-ChildItem "$src/*.dll" |
            Where-Object { $_.Name -notlike "*.Tests.*" } |
            Copy-Item -Destination $dst
          Copy-Item "$src/*.pri" $dst -ErrorAction SilentlyContinue
          Copy-Item "$src/*.xbf" $dst -ErrorAction SilentlyContinue

          if (Test-Path "$src/Assets") {
            Copy-Item "$src/Assets" "$dst/Assets" -Recurse
          }
          if (Test-Path "$src/Microsoft.UI.Xaml") {
            Copy-Item "$src/Microsoft.UI.Xaml" "$dst/Microsoft.UI.Xaml" -Recurse
          }
          if (Test-Path "emfe/Strings") {
            Copy-Item "emfe/Strings" "$dst/Strings" -Recurse
          }
          Get-ChildItem "$src" -Directory |
            Where-Object { $_.Name -match '^[a-z]{2}(-[A-Za-z]{2,}){0,2}$' } |
            ForEach-Object { Copy-Item $_.FullName "$dst/$($_.Name)" -Recurse }

          # Drop debug symbols and any test artifacts.
          Get-ChildItem $dst -Recurse | Where-Object {
            $_.Name -like "*.pdb" -or $_.Name -like "*Tests*"
          } | Remove-Item -Force

      - name: Virus scan release artifacts
        shell: pwsh
        run: |
          Write-Host "Scanning release/ with Windows Defender..."
          # Signature update is best-effort; occasional failures on the
          # GitHub runner ("completed with errors") should not fail the
          # build — the scan still runs with whatever signatures are loaded.
          try {
            Update-MpSignature -ErrorAction Stop
            Write-Host "Signatures updated."
          } catch {
            Write-Warning "Signature update failed (continuing with stale signatures): $_"
          }
          Start-MpScan -ScanType CustomScan -ScanPath "$PWD\release"
          $threats = Get-MpThreatDetection 2>$null
          if ($threats) {
            Write-Error "Threat detected: $($threats | Format-List | Out-String)"
            exit 1
          }
          Write-Host "Scan passed: no threats detected."

      - name: Upload build artifact (release staging)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: emfe_WinUI3Cpp-${{ github.sha }}
          path: release/**
          if-no-files-found: error

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        run: choco install innosetup -y --no-progress

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: iscc installer/setup.iss /DAppVersion=${{ steps.version.outputs.APP_VERSION }} /DArch=x64

      - name: Virus scan installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $installer = Get-ChildItem "installer/Output/emfe-WinUI3-Setup-*-*.exe" | Select-Object -First 1
          Write-Host "Scanning $($installer.FullName) with Windows Defender..."
          try {
            Update-MpSignature -ErrorAction Stop
            Write-Host "Signatures updated."
          } catch {
            Write-Warning "Signature update failed (continuing with stale signatures): $_"
          }
          Start-MpScan -ScanType CustomScan -ScanPath $installer.FullName
          $threats = Get-MpThreatDetection 2>$null
          if ($threats) {
            Write-Error "Threat detected: $($threats | Format-List | Out-String)"
            exit 1
          }
          Write-Host "Scan passed: no threats detected."

      - name: Upload installer artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: emfe_WinUI3Cpp-installer-${{ github.ref_name }}
          path: installer/Output/emfe-WinUI3-Setup-*-*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          INSTALLER=$(ls installer/Output/emfe-WinUI3-Setup-*-*.exe | head -1)
          INSTALLER_NAME=$(basename "$INSTALLER")
          # Delete existing release if tag was moved to a new commit.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" "$INSTALLER" --title "$TAG" --notes "$(cat <<EOF
          ## emfe_WinUI3Cpp ${TAG} (C++/WinUI 3)

          emfe emulator frontend — Windows x64, C++/WinRT + WinUI 3.

          ### Assets
          - **${INSTALLER_NAME}** — Windows x64 installer (Inno Setup). No additional runtime prerequisites; the Windows App SDK is bundled self-contained.

          ### Installation
          Run the installer.

          After installation, drop \`emfe_plugin_*.dll\` files into the \`plugins\\\` directory inside the installation folder (or download them from
          [emfe_plugins releases](https://github.com/hha0x617/emfe_plugins/releases) which ship as a pre-structured \`plugins/\` zip).

          ### Security
          - Virus scan: **Passed** (Windows Defender, signatures updated at build time)

          ### Source Code (Apache-2.0)
          - **Repository**: [emfe_WinUI3Cpp](https://github.com/${{ github.repository }})
          - **Build workflow**: [.github/workflows/build.yml](https://github.com/${{ github.repository }}/blob/${TAG}/.github/workflows/build.yml)
          EOF
          )"
